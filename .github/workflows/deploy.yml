name: Deploy TaxiMonitor Backend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script: |
            set -e
            echo "📁 Creating app folder..."
            mkdir -p /var/www/taxiMonitor
            cd /var/www/taxiMonitor

            if [ ! -d ".git" ]; then
              echo "📥 Cloning public repository..."
              git clone https://github.com/tuxtasinboyev/Taxi_manitor.git .
            else
              echo "♻️ Pulling latest code..."
              git reset --hard
              git pull origin main
            fi

            echo "🛑 Managing containers..."
            docker compose down || true

            echo "🛠️ Building and Starting..."
            docker compose up -d --build

            echo "🧹 Cleaning up..."
            docker image prune -f

            echo "🎉 TaxiMonitor Deploy finished successfully!"
