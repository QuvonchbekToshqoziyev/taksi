version: "3.9"

services:
  db:
    image: postgres:15
    container_name: taxiMonitor_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: taxiMonitor_app
    restart: always
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - db
    volumes:
      - uploads_data:/app/core/uploads
    command: >
      sh -c "
        npx prisma@6 generate &&
        npx prisma@6 migrate deploy &&
        npm run start:prod
      "
    environment:
      DATABASE_URL: ${DATABASE_URL}

volumes:
  postgres_data:
  uploads_data:
